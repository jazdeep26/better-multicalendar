<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7FD3FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5BA3E0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Main rounded square background -->
  <rect x="16" y="16" width="160" height="160" rx="36" fill="url(#blueGrad)" filter="url(#shadow)" />

  <!-- Top accent circles (subtle) -->
  <circle cx="52" cy="48" r="7" fill="#4A7BA7" opacity="0.4" />
  <circle cx="140" cy="48" r="7" fill="#4A7BA7" opacity="0.4" />

  <!-- Large date number "31" -->
  <text x="92" y="128" font-size="84" font-weight="700" font-family="system-ui, -apple-system, sans-serif" fill="#1A4D7A" text-anchor="middle" letter-spacing="-1">31</text>

  <!-- Bright green swoosh accent (bottom right corner) -->
  <path d="M 140 130 Q 160 150 176 170 L 176 176 Q 152 160 140 140 Z" fill="#1FBF63" opacity="0.95" />
</svg>